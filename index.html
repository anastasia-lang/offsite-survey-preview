<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartagena, but better — Offsite Survey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#3E4FE0;
    --blue-dark:#2F35C8;
    --blue-tint:#EEF0FE;
    --ink:#0A0A0F;
    --muted:#5A5F6E;
    --paper:#FAFAF7;
    --card:#FFFFFF;
    --line:rgba(10,10,15,.12);
    --coral:#FF6B5E;
    --yellow:#FFC145;
    --radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Geist',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:var(--paper);
    color:var(--ink);
    display:flex;flex-direction:column;align-items:center;
    min-height:100vh;
    background-image:
      radial-gradient(640px 420px at 88% -6%, rgba(255,193,69,.14) 0%, transparent 70%),
      radial-gradient(520px 380px at -8% 100%, rgba(255,107,94,.10) 0%, transparent 70%),
      linear-gradient(90deg, var(--paper) 0, var(--paper) 0),
      repeating-linear-gradient(90deg, transparent 0 calc(25% - 1px), rgba(10,10,15,.045) calc(25% - 1px) 25%);
  }
  #app{width:100%;max-width:660px;padding:20px 20px 48px;display:flex;flex-direction:column;flex:1;}

  /* top bar */
  .topbar{display:flex;align-items:center;gap:12px;margin-bottom:22px;min-height:36px;}
  .backbtn{
    border:1.5px solid var(--line);background:var(--card);width:36px;height:36px;border-radius:50%;
    font-size:15px;cursor:pointer;color:var(--ink);
    display:flex;align-items:center;justify-content:center;flex:0 0 auto;
    transition:all .12s ease;
  }
  .backbtn:hover{transform:translateX(-2px);border-color:var(--blue);}
  .backbtn.hidden{visibility:hidden;}
  .progress-wrap{flex:1;height:8px;background:rgba(10,10,15,.08);border-radius:99px;overflow:hidden;}
  .progress-bar{height:100%;width:0%;border-radius:99px;background:linear-gradient(90deg,var(--coral),var(--yellow));transition:width .35s ease;}
  .proto-badge{
    font-family:'Geist Mono',ui-monospace,monospace;
    font-size:10px;font-weight:500;letter-spacing:.1em;color:#fff;
    background:var(--ink);padding:5px 10px;border-radius:99px;flex:0 0 auto;
  }

  .screen{animation:slideIn .3s ease both;display:flex;flex-direction:column;flex:1;}
  @keyframes slideIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}

  .kicker{
    display:inline-flex;align-items:center;gap:8px;width:fit-content;
    font-family:'Geist Mono',ui-monospace,monospace;
    font-size:11px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;
    color:var(--muted);background:#F0F0EC;border:1px solid var(--line);
    padding:6px 12px;border-radius:99px;margin-bottom:14px;
  }
  .kicker::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--blue);flex:0 0 auto;}
  h1{font-size:40px;font-weight:600;line-height:1.06;letter-spacing:-.03em;margin-bottom:12px;}
  h2{font-size:26px;font-weight:600;line-height:1.15;letter-spacing:-.02em;margin-bottom:8px;}
  .sub{font-size:15px;color:var(--muted);line-height:1.55;margin-bottom:22px;}

  /* landing — Yuno hero */
  .landing{
    justify-content:center;text-align:center;
    background:linear-gradient(135deg,#4856F2 0%,#3E4FE0 45%,#282DC9 100%);
    border-radius:24px;padding:56px 30px;color:#fff;
    position:relative;overflow:hidden;
    box-shadow:0 24px 60px rgba(46,53,208,.30);
  }
  .landing::before{
    content:'';position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(90deg, transparent 0 calc(25% - 1px), rgba(255,255,255,.08) calc(25% - 1px) 25%);
  }
  .landing::after{
    content:'';position:absolute;inset:0;pointer-events:none;
    background:
      radial-gradient(460px 320px at 82% 12%, rgba(255,150,94,.38) 0%, transparent 70%),
      radial-gradient(380px 280px at 12% 92%, rgba(255,193,69,.22) 0%, transparent 70%);
  }
  .landing>*{position:relative;z-index:1;}
  .landing h1{color:#fff;font-size:46px;}
  .landing .sub{color:rgba(255,255,255,.80);}
  .landing .kicker{background:rgba(255,255,255,.14);border-color:transparent;color:rgba(255,255,255,.9);}
  .landing .kicker::before{background:var(--yellow);}
  .hero-emoji{font-size:44px;margin-bottom:16px;}
  .track-card{
    background:#fff;border-radius:12px;padding:18px 22px;margin:0 auto 12px;max-width:430px;
    cursor:pointer;border:none;
    display:flex;align-items:center;gap:14px;text-align:left;width:100%;
    transition:transform .12s ease,box-shadow .12s ease;font-family:inherit;
  }
  .track-card:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(0,0,0,.18);}
  .track-card .ticon{font-size:28px;flex:0 0 auto;}
  .track-card .tname{font-size:16px;font-weight:600;color:var(--ink);}
  .track-card .tdesc{font-family:'Geist Mono',ui-monospace,monospace;font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:.02em;}

  /* generic option list */
  .opts{display:flex;flex-direction:column;gap:10px;}
  .opt{
    background:var(--card);border:1.5px solid var(--line);border-radius:12px;
    padding:15px 18px;font-size:15px;font-weight:500;color:var(--ink);text-align:left;
    cursor:pointer;transition:all .12s ease;font-family:inherit;
    display:flex;align-items:center;gap:12px;width:100%;
  }
  .opt:hover{border-color:var(--blue);}
  .opt.selected{border-color:var(--blue);background:var(--blue-tint);}
  .opt .oemoji{font-size:20px;flex:0 0 auto;}
  .opt .rankbadge{
    margin-left:auto;background:var(--blue);color:#fff;font-weight:600;font-size:13px;
    width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:0 0 auto;
  }

  /* chips */
  .chips{display:flex;flex-wrap:wrap;gap:10px;}
  .chip{
    background:var(--card);border:1.5px solid var(--line);border-radius:99px;
    padding:10px 16px;font-size:14px;font-weight:500;color:var(--ink);cursor:pointer;
    transition:all .12s ease;font-family:inherit;
  }
  .chip:hover{border-color:var(--blue);}
  .chip.selected{background:var(--blue);border-color:var(--blue);color:#fff;}
  .addchip-row{display:flex;gap:8px;margin-top:14px;}
  .addchip-row input{
    flex:1;border:1.5px solid var(--line);border-radius:99px;padding:10px 16px;
    font-size:14px;font-family:inherit;background:var(--card);color:var(--ink);outline:none;
  }
  .addchip-row input:focus{border-color:var(--blue);}
  .addchip-row button{
    border:none;background:var(--ink);color:#fff;border-radius:99px;padding:10px 18px;
    font-weight:600;font-size:14px;cursor:pointer;font-family:inherit;
  }

  /* keep/remix/kill cards */
  .kcard{
    background:var(--card);border:1.5px solid var(--line);border-radius:16px;
    box-shadow:0 10px 28px rgba(10,10,15,.06);
    padding:34px 26px;text-align:center;margin-bottom:18px;position:relative;
    animation:cardIn .28s ease both;
  }
  @keyframes cardIn{from{opacity:0;transform:scale(.94) rotate(-1deg);}to{opacity:1;transform:none;}}
  .kcard .kemoji{font-size:42px;margin-bottom:10px;}
  .kcard .kname{font-size:21px;font-weight:600;letter-spacing:-.01em;}
  .kcard .khint{font-size:13px;color:var(--muted);margin-top:6px;}
  .kcount{position:absolute;top:14px;right:16px;font-family:'Geist Mono',ui-monospace,monospace;font-size:11px;font-weight:500;color:var(--muted);}
  .kbtns{display:flex;gap:10px;}
  .kbtn{
    flex:1;border:none;border-radius:10px;padding:14px 8px;font-size:14px;font-weight:600;
    cursor:pointer;font-family:inherit;transition:all .1s ease;color:#fff;
  }
  .kbtn:hover{transform:translateY(-2px);}
  .kbtn.kill{background:var(--ink);}
  .kbtn.remix{background:var(--yellow);color:var(--ink);}
  .kbtn.keep{background:var(--blue);}

  /* A/B this-or-that */
  .ab-wrap{display:flex;flex-direction:column;gap:12px;}
  .ab-count{font-family:'Geist Mono',ui-monospace,monospace;font-size:11px;font-weight:500;letter-spacing:.08em;color:var(--muted);margin-bottom:10px;}
  .ab-card{
    background:var(--card);border:1.5px solid var(--line);border-radius:12px;
    padding:22px;cursor:pointer;text-align:center;
    transition:all .12s ease;font-family:inherit;width:100%;
  }
  .ab-card:hover{border-color:var(--blue);background:var(--blue-tint);}
  .ab-card .abemoji{font-size:28px;margin-bottom:8px;}
  .ab-card .abtext{font-size:15.5px;font-weight:600;line-height:1.3;letter-spacing:-.01em;}
  .ab-vs{text-align:center;font-family:'Geist Mono',ui-monospace,monospace;font-size:11px;font-weight:500;color:var(--coral);letter-spacing:.14em;}

  /* budget */
  .coins-left{
    text-align:center;font-size:15px;font-weight:600;color:var(--ink);
    background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:12px;
    margin-bottom:16px;position:sticky;top:8px;z-index:5;
  }
  .coins-left .cnum{font-size:22px;color:var(--blue);font-weight:600;}
  .coins-left.done{background:var(--blue);border-color:var(--blue);color:#fff;}
  .coins-left.done .cnum{color:var(--yellow);}
  .brow{
    background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:14px 16px;
    display:flex;align-items:center;gap:12px;margin-bottom:10px;
  }
  .brow .blabel{flex:1;}
  .brow .bname{font-size:14.5px;font-weight:600;}
  .brow .bdesc{font-size:12px;color:var(--muted);margin-top:2px;}
  .stepper{display:flex;align-items:center;gap:8px;flex:0 0 auto;}
  .stepper button{
    width:34px;height:34px;border-radius:50%;border:1.5px solid var(--line);font-size:17px;font-weight:600;
    cursor:pointer;font-family:inherit;background:var(--card);color:var(--ink);
    transition:all .12s ease;
  }
  .stepper button:hover{border-color:var(--blue);background:var(--blue-tint);}
  .stepper button:disabled{opacity:.25;cursor:default;border-color:var(--line);background:var(--card);}
  .stepper .bval{width:34px;text-align:center;font-weight:600;font-size:16px;}
  .bfill{height:4px;border-radius:99px;background:rgba(10,10,15,.07);margin-top:8px;overflow:hidden;}
  .bfill>div{height:100%;background:linear-gradient(90deg,var(--blue),#8A93F7);border-radius:99px;transition:width .2s ease;}

  /* text */
  textarea,.textinput{
    width:100%;border:1.5px solid var(--line);border-radius:12px;padding:16px;
    font-size:15px;font-family:inherit;background:var(--card);color:var(--ink);
    outline:none;resize:vertical;min-height:120px;line-height:1.5;
  }
  .textinput{min-height:0;}
  textarea:focus,.textinput:focus{border-color:var(--blue);}

  /* primary button */
  .cta-row{margin-top:auto;padding-top:22px;display:flex;gap:10px;}
  .cta{
    flex:1;border:none;background:var(--blue);color:#fff;border-radius:10px;padding:16px;
    font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;
    transition:all .12s ease;
  }
  .cta:hover{background:var(--blue-dark);transform:translateY(-1px);}
  .cta:disabled{background:#D8D8D2;cursor:default;transform:none;}
  .cta.ghost{background:transparent;color:var(--muted);flex:0 0 auto;padding:16px 18px;font-weight:500;}
  .cta.ghost:hover{color:var(--ink);background:transparent;}

  /* toggle */
  .toggle-row{display:flex;gap:10px;margin-bottom:18px;}
  .toggle-opt{
    flex:1;background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:16px;
    font-size:15px;font-weight:600;cursor:pointer;text-align:center;
    font-family:inherit;color:var(--ink);transition:all .12s ease;
  }
  .toggle-opt:hover{border-color:var(--blue);}
  .toggle-opt.selected{border-color:var(--blue);background:var(--blue-tint);}

  /* summary */
  .sum-card{background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:18px 20px;margin-bottom:12px;}
  .sum-card .sq{font-family:'Geist Mono',ui-monospace,monospace;font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--blue);margin-bottom:6px;}
  .sum-card .sa{font-size:14.5px;line-height:1.5;white-space:pre-wrap;}
  .note{
    background:#FFF8E8;border:1.5px dashed var(--yellow);border-radius:12px;padding:14px 16px;
    font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:16px;
  }

  .field-label{font-size:13px;font-weight:600;color:var(--ink);margin:16px 0 8px;}

  /* confetti canvas */
  #confetti{position:fixed;inset:0;pointer-events:none;z-index:50;}

  @media (max-width:480px){
    h1{font-size:32px;} h2{font-size:22px;}
    .landing h1{font-size:36px;}
    .landing{padding:44px 22px;}
    .kbtn{font-size:12.5px;}
  }
</style>
</head>
<body>
<canvas id="confetti"></canvas>
<div id="app"></div>

<script>
/* ============================================================
   Yuno Offsite Survey — interactive prototype
   Two tracks: all-team (anonymous) & leadership (named)
   ============================================================ */

const state = {
  track: null,        // 'team' | 'leader'
  step: -1,           // -1 = landing
  answers: {},
  kkrIndex: 0,
  abIndex: 0,
};

/* ---------- content: ALL-TEAM track (anonymous) ---------- */
const TEAM_FLOW = [
  {
    id:'veteran', type:'single', kicker:'Warm-up',
    title:'How many Yuno offsites have you lived through?',
    sub:'So we know whose nostalgia we’re dealing with. This survey is anonymous.',
    options:[
      {emoji:'🐣', label:'This will be my first one'},
      {emoji:'🌴', label:'One or two'},
      {emoji:'😎', label:'Three to five'},
      {emoji:'🦖', label:'All of them. I’ve seen things.'},
    ]
  },
  {
    id:'kkr', type:'kkr', kicker:'The purge',
    title:'Keep it, remix it, or kill it?',
    sub:'We’ve collected a few offsite classics over the years — judge each one. 💛 Keep = works as is · 🔧 Remix = keep it, but do it differently · 🗑️ Kill = drop it. No feelings spared, it’s anonymous.',
    cards:[
      {key:'keynotes', emoji:'🎤', name:'Big all-hands keynotes', hint:'Leadership presenting to everyone in one room'},
      {key:'party', emoji:'🪩', name:'The big party night', hint:'You know the one'},
      {key:'excursion', emoji:'⛵', name:'Group excursion / activity day', hint:'Boats, tours, the whole squad moving together'},
      {key:'hackathon', emoji:'🧑‍💻', name:'Hackathon', hint:'Build-something-in-a-day — a past offsite classic'},
      {key:'culturetrips', emoji:'🏛️', name:'Cultural trips', hint:'Exploring the city, local culture and food together'},
      {key:'teamdinners', emoji:'🍽️', name:'Team dinners', hint:'Smaller-group dinners with your own team'},
      {key:'workshops', emoji:'🛠️', name:'Workshops & trainings', hint:'Structured learning sessions'},
      {key:'awards', emoji:'🏆', name:'Awards & recognition moments', hint:'Celebrating people on stage'},
      {key:'freetime', emoji:'🏖️', name:'Unscheduled free time', hint:'Blocks with nothing planned at all'},
    ]
  },
  {
    id:'create', type:'text', kicker:'Create',
    title:'Invent one thing we’ve never done at an offsite.',
    sub:'Anything — a format, a ritual, a session, something weird. The best answers end up on the agenda.',
    placeholder:'e.g. shadow another team for half a day, live customer call replays, a build-something-in-a-day challenge…',
    optional:true
  },
  {
    id:'budget', type:'budget', kicker:'Put your money where your mouth is',
    title:'You’ve got 100 Cartagena coins. Spend the week.',
    sub:'This is the whole game — there’s never enough time for everything, so show us what actually matters to you.',
    buckets:[
      {key:'deepwork', name:'Deep work with my own team', desc:'Focused sessions to plan and build together'},
      {key:'crossteam', name:'Working with other teams', desc:'Cross-team collaboration and problem-solving'},
      {key:'learning', name:'Learning & trainings', desc:'Skills, workshops, masterclasses'},
      {key:'strategy', name:'Strategy & vision sessions', desc:'Where the company is going and why'},
      {key:'bonding', name:'Fun & bonding', desc:'Social time, activities, the party'},
      {key:'recharge', name:'Free time to recharge', desc:'Pool, beach, nap, explore Cartagena'},
    ]
  },
  {
    id:'ab', type:'ab', kicker:'Quick fire',
    title:'This or that?',
    sub:'Go with your gut.',
    pairs:[
      {a:{emoji:'👥', text:'Deep sessions with my own team'}, b:{emoji:'🔀', text:'Mixing with people I never work with'}},
      {a:{emoji:'🗓️', text:'A full schedule — tell me where to be'}, b:{emoji:'🧭', text:'Open space — let me choose my sessions'}},
      {a:{emoji:'🌅', text:'Work hard mornings, free afternoons'}, b:{emoji:'☀️', text:'Full workdays, evenings 100% social'}},
      {a:{emoji:'🎓', text:'Learn from outside experts'}, b:{emoji:'🧠', text:'Learn from colleagues who’ve done it'}},
      {a:{emoji:'🎉', text:'One big everyone-together blowout'}, b:{emoji:'🍷', text:'Smaller, calmer group evenings'}},
    ]
  },
  {
    id:'topics', type:'multi', kicker:'Feed your brain',
    title:'Which topics would actually get you in the room?',
    sub:'Pick up to 5 — or add your own.',
    max:5,
    chips:['AI in my daily work','Product deep-dives','Customer stories & war rooms','Payments industry trends','Storytelling & public speaking','Negotiation skills','Giving & receiving feedback','Technical architecture','How other teams work','Career growth at Yuno','Founder Q&A, no filter'],
  },
  {
    id:'host', type:'host', kicker:'Step up',
    title:'Would you run something in Cartagena?',
    sub:'A talk, a workshop, a game, a run club at 6am — sessions run by our own people beat any external speaker.',
  },
  {
    id:'magic', type:'text', kicker:'The one that matters',
    title:'It’s the Monday after the offsite. What’s different?',
    sub:'One sentence. If only one thing changes because of Cartagena, what should it be?',
    placeholder:'e.g. I finally understand what the other half of the company does…',
    optional:false
  },
];

/* ---------- content: LEADERSHIP bonus round (named, shown only to leaders) ---------- */
const ROLE_Q = {
  id:'role', type:'single', kicker:'Almost done',
  title:'One more thing — do you lead a team?',
  sub:'Leaders get a short bonus round: your answers there literally become agenda slots and room bookings.',
  options:[
    {emoji:'🧭', label:'Yes — I lead a team'},
    {emoji:'🎉', label:'Nope — take me to the confetti'},
  ]
};
const LEADER_ADDON = [
  {
    id:'name', type:'name', kicker:'Leadership bonus round',
    title:'Who’s answering?',
    sub:'Everything before this stays anonymous. The bonus round is named — we’ll follow up on your session proposals.',
    placeholder:'Your name'
  },
  {
    id:'outcomes', type:'rank', kicker:'Start from the end',
    title:'It’s the Monday after Cartagena. What changed?',
    sub:'Pick your top 3 outcomes, in order. Everything else about the agenda gets designed backwards from this.',
    need:3,
    options:[
      {emoji:'🎯', label:'Everyone aligned on strategy & vision'},
      {emoji:'📋', label:'Each team leaves with a concrete execution plan'},
      {emoji:'🤝', label:'Real trust built across teams'},
      {emoji:'⚖️', label:'The big pending decisions got made'},
      {emoji:'📈', label:'People upgraded their skills'},
      {emoji:'🔥', label:'People left re-energized and proud to be here'},
    ]
  },
  {
    id:'decisions', type:'text', kicker:'Decide, not discuss',
    title:'What must get DECIDED in Cartagena?',
    sub:'Not “discussed”. Decided. List the calls that keep getting postponed and should not survive the week.',
    placeholder:'e.g. ownership of the AI concierge, 2026 priorities per team, org structure for delivery…',
    optional:false
  },
  {
    id:'runsession', type:'host-leader', kicker:'Own a slot',
    title:'What session will YOU run?',
    sub:'Every leader runs at least one thing. What’s yours, and who is it for?',
  },
  {
    id:'weekend', type:'multi', kicker:'The weekend before',
    title:'Leadership weekend: what deserves the hours?',
    sub:'We meet as a leadership group before everyone arrives. Pick the top 3 topics worth that time.',
    max:3,
    chips:['2026 strategy & vision','Budget & resource allocation','Org design & talent','Product strategy (incl. AI concierge)','Ways of working between our teams','KPIs & accountability','Culture & performance standards','Customer & revenue priorities'],
  },
  {
    id:'rooms', type:'rooms', kicker:'Logistics that make or break it',
    title:'Room time: what do you need booked?',
    sub:'Physical space gets assigned in advance this time. Tell us what to reserve for you.',
  },
];

/* ---------- helpers ---------- */
const app = document.getElementById('app');
const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const isLeader = () => (state.answers.role||'').startsWith('Yes');
const flow = () => [...TEAM_FLOW, ROLE_Q, ...(isLeader() ? LEADER_ADDON : [])];

function go(step){
  state.step = step;
  render();
  window.scrollTo({top:0});
}

function saveAndNext(id, val){
  state.answers[id] = val;
  if(state.step + 1 >= flow().length){ go(999); }
  else go(state.step + 1);
}

function topbarHTML(){
  if(state.step === -1) return '';
  const total = flow().length;
  const pct = state.step === 999 ? 100 : Math.round((state.step) / total * 100);
  return `
    <div class="topbar">
      <button class="backbtn ${state.step<=0?'hidden':''}" onclick="goBack()">←</button>
      <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
    </div>`;
}

function goBack(){
  if(state.step === 999){ go(flow().length - 1); return; }
  if(state.step > 0) go(state.step - 1);
}

function restart(){
  state.track = null; state.step = -1; state.answers = {}; state.kkrIndex = 0; state.abIndex = 0;
  render();
}

/* ---------- renderers ---------- */
function render(){
  if(state.step === -1) return renderLanding();
  if(state.step === 999) return renderEnd();
  const q = flow()[state.step];
  const r = {
    single: renderSingle, kkr: renderKKR, text: renderText, budget: renderBudget,
    ab: renderAB, multi: renderMulti, host: renderHost, name: renderName,
    rank: renderRank, 'host-leader': renderHostLeader, rooms: renderRooms, twotext: renderTwoText,
  }[q.type];
  r(q);
}

function head(q){
  return `${topbarHTML()}
    <div class="kicker">${q.kicker||''}</div>
    <h2>${q.title}</h2>
    ${q.sub?`<p class="sub">${q.sub}</p>`:''}`;
}

function renderLanding(){
  app.innerHTML = `
    <div class="screen landing">
      <div class="hero-emoji">🌴☀️🇨🇴</div>
      <div class="kicker">Yuno Offsite · Cartagena 2026</div>
      <h1>Cartagena,<br>but better.</h1>
      <p class="sub" style="max-width:440px;margin:0 auto 26px;">
        The Yuno offsite is back &mdash; and this time, all of us design it.
        Five minutes, a few games, zero boring forms &mdash; your answers literally shape the agenda.
      </p>
      <button class="track-card" onclick="startTrack()" style="justify-content:center;">
        <span class="ticon">🚀</span>
        <span><span class="tname">Design the offsite</span>
        <div class="tdesc">Anonymous &middot; ~5 minutes &middot; be brutally honest</div></span>
      </button>
      <p class="sub" style="font-size:12px;margin-top:18px;">🔒 Anonymous &mdash; answers are stored securely.</p>
    </div>`;
}

function startTrack(){
  state.answers = {}; state.kkrIndex = 0; state.abIndex = 0;
  go(0);
}

/* single choice — auto advance */
function renderSingle(q){
  app.innerHTML = `<div class="screen">${head(q)}
    <div class="opts">
      ${q.options.map((o,i)=>`
        <button class="opt" onclick="pickSingle(${i})">
          <span class="oemoji">${o.emoji}</span>${o.label}
        </button>`).join('')}
    </div></div>`;
}
function pickSingle(i){
  const q = flow()[state.step];
  document.querySelectorAll('.opt')[i].classList.add('selected');
  setTimeout(()=>saveAndNext(q.id, q.options[i].label), 220);
}

/* keep / remix / kill */
function renderKKR(q){
  if(!state.answers.kkr) state.answers.kkr = {};
  const c = q.cards[state.kkrIndex];
  app.innerHTML = `<div class="screen">${head(q)}
    <div class="kcard">
      <div class="kcount">${state.kkrIndex+1} / ${q.cards.length}</div>
      <div class="kemoji">${c.emoji}</div>
      <div class="kname">${c.name}</div>
      <div class="khint">${c.hint}</div>
    </div>
    <div class="kbtns">
      <button class="kbtn kill" onclick="pickKKR('kill')">🗑️ Kill it</button>
      <button class="kbtn remix" onclick="pickKKR('remix')">🔧 Remix it</button>
      <button class="kbtn keep" onclick="pickKKR('keep')">💛 Keep it</button>
    </div></div>`;
}
function pickKKR(verdict){
  const q = flow()[state.step];
  state.answers.kkr[q.cards[state.kkrIndex].name] = verdict;
  if(state.kkrIndex + 1 < q.cards.length){ state.kkrIndex++; render(); }
  else { state.kkrIndex = 0; saveAndNext('kkr', state.answers.kkr); }
}

/* free text */
function renderText(q){
  app.innerHTML = `<div class="screen">${head(q)}
    <textarea id="txt" placeholder="${esc(q.placeholder||'')}">${esc(state.answers[q.id]||'')}</textarea>
    <div class="cta-row">
      ${q.optional?`<button class="cta ghost" onclick="saveAndNext('${q.id}','')">Skip</button>`:''}
      <button class="cta" id="txtgo" ${q.optional?'':'disabled'} onclick="submitText('${q.id}')">Continue →</button>
    </div></div>`;
  const ta = document.getElementById('txt');
  ta.focus();
  if(!q.optional){
    const btn = document.getElementById('txtgo');
    const check = ()=>{ btn.disabled = ta.value.trim().length < 3; };
    ta.addEventListener('input', check); check();
  }
}
function submitText(id){ saveAndNext(id, document.getElementById('txt').value.trim()); }

/* budget 100 coins */
function renderBudget(q){
  if(!state._budget) state._budget = {};
  q.buckets.forEach(b=>{ if(state._budget[b.key]==null) state._budget[b.key]=0; });
  app.innerHTML = `<div class="screen">${head(q)}
    <div class="coins-left" id="coinbox"></div>
    <div id="brows"></div>
    <div class="cta-row"><button class="cta" id="bgo" disabled onclick="submitBudget('${q.id}')">Lock it in →</button></div>
  </div>`;
  drawBudget(q);
}
function budgetSpent(){ return Object.values(state._budget).reduce((a,b)=>a+b,0); }
function drawBudget(q){
  const left = 100 - budgetSpent();
  const box = document.getElementById('coinbox');
  box.className = 'coins-left' + (left===0?' done':'');
  box.innerHTML = left===0 ? `🎉 All spent! <span class="cnum">0</span> coins left`
                           : `🪙 <span class="cnum">${left}</span> coins left to spend`;
  document.getElementById('brows').innerHTML = q.buckets.map(b=>`
    <div class="brow">
      <div class="blabel">
        <div class="bname">${b.name}</div>
        <div class="bdesc">${b.desc}</div>
        <div class="bfill"><div style="width:${state._budget[b.key]}%"></div></div>
      </div>
      <div class="stepper">
        <button ${state._budget[b.key]===0?'disabled':''} onclick="bumpBudget('${b.key}',-10)">−</button>
        <span class="bval">${state._budget[b.key]}</span>
        <button ${left===0?'disabled':''} onclick="bumpBudget('${b.key}',10)">+</button>
      </div>
    </div>`).join('');
  document.getElementById('bgo').disabled = left !== 0;
}
function bumpBudget(key, d){
  const left = 100 - budgetSpent();
  if(d>0 && left<=0) return;
  state._budget[key] = Math.max(0, state._budget[key] + Math.min(d, d>0?left:d));
  drawBudget(flow()[state.step]);
}
function submitBudget(id){
  saveAndNext(id, {...state._budget});
  state._budget = null;
}

/* this-or-that */
function renderAB(q){
  if(!state.answers.ab) state.answers.ab = [];
  const p = q.pairs[state.abIndex];
  app.innerHTML = `<div class="screen">${head(q)}
    <div class="ab-count">${state.abIndex+1} of ${q.pairs.length}</div>
    <div class="ab-wrap">
      <button class="ab-card" onclick="pickAB('a')">
        <div class="abemoji">${p.a.emoji}</div><div class="abtext">${p.a.text}</div>
      </button>
      <div class="ab-vs">— OR —</div>
      <button class="ab-card" onclick="pickAB('b')">
        <div class="abemoji">${p.b.emoji}</div><div class="abtext">${p.b.text}</div>
      </button>
    </div></div>`;
}
function pickAB(side){
  const q = flow()[state.step];
  const p = q.pairs[state.abIndex];
  state.answers.ab[state.abIndex] = (side==='a'?p.a.text:p.b.text);
  if(state.abIndex + 1 < q.pairs.length){ state.abIndex++; render(); }
  else { state.abIndex = 0; saveAndNext('ab', [...state.answers.ab]); }
}

/* multi chips with custom add */
function renderMulti(q){
  if(!state._multi) state._multi = new Set(state.answers[q.id]||[]);
  if(!state._customChips) state._customChips = [];
  state._allChips = [...q.chips, ...state._customChips];
  app.innerHTML = `<div class="screen">${head(q)}
    <div class="chips">
      ${state._allChips.map((c,i)=>`<button class="chip ${state._multi.has(c)?'selected':''}" onclick="toggleChip(this,${i})">${esc(c)}</button>`).join('')}
    </div>
    <div class="addchip-row">
      <input id="customchip" placeholder="Add your own topic…" onkeydown="if(event.key==='Enter')addChip()">
      <button onclick="addChip()">Add</button>
    </div>
    <div class="cta-row"><button class="cta" id="mgo" onclick="submitMulti('${q.id}')">Continue →</button></div>
  </div>`;
  updateMultiBtn(q);
}
function toggleChip(el, i){
  const q = flow()[state.step];
  const c = state._allChips[i];
  if(state._multi.has(c)){ state._multi.delete(c); el.classList.remove('selected'); }
  else{
    if(state._multi.size >= q.max){ return; }
    state._multi.add(c); el.classList.add('selected');
  }
  updateMultiBtn(q);
}
function updateMultiBtn(q){
  const btn = document.getElementById('mgo');
  btn.disabled = state._multi.size === 0;
  btn.textContent = state._multi.size === 0 ? `Pick at least one` : `Continue with ${state._multi.size}/${q.max} →`;
}
function addChip(){
  const inp = document.getElementById('customchip');
  const v = inp.value.trim();
  if(!v) return;
  const q = flow()[state.step];
  if(!state._customChips.includes(v)) state._customChips.push(v);
  if(state._multi.size < q.max) state._multi.add(v);
  inp.value='';
  renderMulti(q);
}
function submitMulti(id){
  saveAndNext(id, [...state._multi]);
  state._multi = null; state._customChips = null;
}

/* team: would you host */
function renderHost(q){
  if(!state._host) state._host = {will:null, what:'', name:''};
  app.innerHTML = `<div class="screen">${head(q)}
    <div class="toggle-row">
      <button class="toggle-opt ${state._host.will==='yes'?'selected':''}" onclick="setHost('yes')">🙌 Yes, I'd run something</button>
      <button class="toggle-opt ${state._host.will==='no'?'selected':''}" onclick="setHost('no')">👀 I'll just attend</button>
    </div>
    <div id="hostfields">${state._host.will==='yes'?`
      <div class="field-label">What would you run?</div>
      <textarea id="hostwhat" style="min-height:80px" placeholder="A workshop on…, a morning run club, a poker night, a talk about…">${esc(state._host.what)}</textarea>
      <div class="field-label">Your name (optional — only so we can follow up, rest of the survey stays anonymous)</div>
      <input class="textinput" id="hostname" placeholder="Name (optional)" value="${esc(state._host.name)}">
    `:''}</div>
    <div class="cta-row"><button class="cta" id="hgo" ${state._host.will?'':'disabled'} onclick="submitHost('${q.id}')">Continue →</button></div>
  </div>`;
}
function setHost(v){
  captureHostFields();
  state._host.will = v; renderHost(flow()[state.step]);
}
function captureHostFields(){
  const w = document.getElementById('hostwhat'); if(w) state._host.what = w.value;
  const n = document.getElementById('hostname'); if(n) state._host.name = n.value;
}
function submitHost(id){
  captureHostFields();
  saveAndNext(id, {...state._host});
  state._host = null;
}

/* leader: name */
function renderName(q){
  app.innerHTML = `<div class="screen">${head(q)}
    <input class="textinput" id="nm" placeholder="${esc(q.placeholder)}" value="${esc(state.answers[q.id]||'')}">
    <div class="cta-row"><button class="cta" id="ngo" disabled onclick="saveAndNext('${q.id}',document.getElementById('nm').value.trim())">Let's go →</button></div>
  </div>`;
  const inp = document.getElementById('nm'); inp.focus();
  const check = ()=>{ document.getElementById('ngo').disabled = inp.value.trim().length < 2; };
  inp.addEventListener('input', check); check();
}

/* leader: rank top N */
function renderRank(q){
  if(!state._rank) state._rank = [];
  app.innerHTML = `<div class="screen">${head(q)}
    <div class="opts">
      ${q.options.map((o,i)=>{
        const pos = state._rank.indexOf(i);
        return `<button class="opt ${pos>-1?'selected':''}" onclick="toggleRank(${i})">
          <span class="oemoji">${o.emoji}</span>${o.label}
          ${pos>-1?`<span class="rankbadge">${pos+1}</span>`:''}
        </button>`;
      }).join('')}
    </div>
    <div class="cta-row"><button class="cta" id="rgo" ${state._rank.length===q.need?'':'disabled'} onclick="submitRank('${q.id}')">Continue →</button></div>
  </div>`;
}
function toggleRank(i){
  const q = flow()[state.step];
  const pos = state._rank.indexOf(i);
  if(pos>-1) state._rank.splice(pos,1);
  else if(state._rank.length < q.need) state._rank.push(i);
  renderRank(q);
}
function submitRank(id){
  const q = flow()[state.step];
  saveAndNext(id, state._rank.map((i,pos)=>`${pos+1}. ${q.options[i].label}`));
  state._rank = null;
}

/* leader: session you'd run */
function renderHostLeader(q){
  if(!state._hl) state._hl = {what:'', audience:new Set()};
  const AUD = ['My team','Cross-team','Everyone','Leadership only'];
  app.innerHTML = `<div class="screen">${head(q)}
    <div class="field-label">Your session</div>
    <textarea id="hlwhat" style="min-height:90px" placeholder="e.g. A working session to map every handoff between sales and delivery — and fix the three worst ones.">${esc(state._hl.what)}</textarea>
    <div class="field-label">Who's it for?</div>
    <div class="chips">
      ${AUD.map(a=>`<button class="chip ${state._hl.audience.has(a)?'selected':''}" onclick="toggleAud('${a}')">${a}</button>`).join('')}
    </div>
    <div class="cta-row"><button class="cta" id="hlgo" onclick="submitHL('${q.id}')">Continue →</button></div>
  </div>`;
  updateHLBtn();
}
function toggleAud(a){
  const w = document.getElementById('hlwhat'); if(w) state._hl.what = w.value;
  if(state._hl.audience.has(a)) state._hl.audience.delete(a); else state._hl.audience.add(a);
  renderHostLeader(flow()[state.step]);
}
function updateHLBtn(){
  const btn = document.getElementById('hlgo');
  const ta = document.getElementById('hlwhat');
  const check = ()=>{ btn.disabled = ta.value.trim().length < 5 || state._hl.audience.size === 0; };
  ta.addEventListener('input', check); check();
}
function submitHL(id){
  saveAndNext(id, {session:document.getElementById('hlwhat').value.trim(), audience:[...state._hl.audience]});
  state._hl = null;
}

/* leader: rooms */
function renderRooms(q){
  if(!state._rooms) state._rooms = {teams:'', blocks:null};
  app.innerHTML = `<div class="screen">${head(q)}
    <div class="field-label">Which teams or groups do you need dedicated room time with?</div>
    <textarea id="rteams" style="min-height:80px" placeholder="e.g. my full team (12p), plus one joint session with product + support">${esc(state._rooms.teams)}</textarea>
    <div class="field-label">How many working blocks (half-days) would you use?</div>
    <div class="toggle-row">
      ${['1','2','3+'].map(b=>`<button class="toggle-opt ${state._rooms.blocks===b?'selected':''}" onclick="setBlocks('${b}')">${b}</button>`).join('')}
    </div>
    <div class="cta-row"><button class="cta" id="rmgo" ${state._rooms.blocks?'':'disabled'} onclick="submitRooms('${q.id}')">Continue →</button></div>
  </div>`;
}
function setBlocks(b){
  const t = document.getElementById('rteams'); if(t) state._rooms.teams = t.value;
  state._rooms.blocks = b; renderRooms(flow()[state.step]);
}
function submitRooms(id){
  saveAndNext(id, {teams:document.getElementById('rteams').value.trim(), halfDayBlocks:state._rooms.blocks});
  state._rooms = null;
}

/* leader: keep + kill two fields */
function renderTwoText(q){
  if(!state._tt) state._tt = {};
  app.innerHTML = `<div class="screen">${head(q)}
    ${q.fields.map(f=>`
      <div class="field-label">${f.label}</div>
      <textarea id="tt_${f.key}" style="min-height:70px" placeholder="${esc(f.placeholder)}">${esc(state._tt[f.key]||'')}</textarea>
    `).join('')}
    <div class="cta-row"><button class="cta" id="ttgo" onclick="submitTT('${q.id}')">Finish 🎉</button></div>
  </div>`;
  const btn = document.getElementById('ttgo');
  const tas = q.fields.map(f=>document.getElementById('tt_'+f.key));
  const check = ()=>{ btn.disabled = tas.some(t=>t.value.trim().length<3); };
  tas.forEach(t=>t.addEventListener('input', check)); check();
}
function submitTT(id){
  const q = flow()[state.step];
  const out = {};
  q.fields.forEach(f=>{ out[f.key] = document.getElementById('tt_'+f.key).value.trim(); });
  saveAndNext(id, out);
}

/* ---------- end screen ---------- */
const LABELS = {
  veteran:'Offsites attended', kkr:'Keep / Remix / Kill', create:'Never-done-before idea',
  budget:'100 coins allocation', ab:'This-or-that picks', topics:'Topics picked',
  host:'Would run a session', magic:'The one thing that should change',
  role:'Leads a team', name:'Name', outcomes:'Top 3 outcomes', decisions:'Must be DECIDED',
  runsession:'Session they’ll run', weekend:'Leadership weekend topics',
  rooms:'Room bookings needed', keepkill:'Keep & Kill',
};
function fmtAnswer(v){
  if(v==null || v==='') return '—';
  if(Array.isArray(v)) return v.join('\n');
  if(typeof v === 'object'){
    return Object.entries(v).map(([k,val])=>{
      if(Array.isArray(val)) val = val.join(', ');
      if(typeof val === 'boolean') val = val?'yes':'no';
      return `${k}: ${val}`;
    }).join('\n');
  }
  return String(v);
}
function renderEnd(){
  const order = flow().map(q=>q.id);
  app.innerHTML = `${topbarHTML()}
    <div class="screen">
      <div class="hero-emoji" style="text-align:center">🎉</div>
      <h2 style="text-align:center">That's it. Cartagena thanks you.</h2>
      <p class="sub" style="text-align:center">${isLeader()
        ? 'Your answers go straight into the agenda design — expect follow-up on your session.'
        : 'Your answers are anonymous and go straight into designing the week.'}</p>
      <div class="note">✅ <b>Your answers are in.</b> Here's a recap of what you submitted — thank you for shaping the offsite.</div>
      ${order.filter(id=>state.answers[id]!==undefined).map(id=>`
        <div class="sum-card">
          <div class="sq">${LABELS[id]||id}</div>
          <div class="sa">${esc(fmtAnswer(state.answers[id]))}</div>
        </div>`).join('')}
      <div class="cta-row">
        <button class="cta ghost" onclick="restart()">↺ Start over</button>
        <button class="cta" onclick="copySummary()">Copy my answers</button>
      </div>
    </div>`;
  confettiBurst();
}
function copySummary(){
  const order = flow().map(q=>q.id);
  const txt = order.filter(id=>state.answers[id]!==undefined)
    .map(id=>`${LABELS[id]||id}:\n${fmtAnswer(state.answers[id])}`).join('\n\n');
  navigator.clipboard.writeText(txt).then(()=>{
    document.querySelector('.cta:not(.ghost)').textContent = 'Copied ✓';
  });
}

/* ---------- confetti ---------- */
function confettiBurst(){
  const cv = document.getElementById('confetti');
  const ctx = cv.getContext('2d');
  cv.width = innerWidth; cv.height = innerHeight;
  const colors = ['#3E4FE0','#FF6B5E','#FFC145','#0A0A0F','#FFFFFF'];
  let seed = 12345;
  const rnd = ()=>{ seed = (seed*16807)%2147483647; return seed/2147483647; };
  const parts = Array.from({length:120},()=>({
    x: cv.width/2 + (rnd()-0.5)*200, y: cv.height*0.3,
    vx:(rnd()-0.5)*12, vy:-(rnd()*10+4), s:rnd()*8+4,
    c:colors[Math.floor(rnd()*colors.length)], r:rnd()*Math.PI, vr:(rnd()-0.5)*0.3, life:1
  }));
  let t=0;
  (function tick(){
    t++; ctx.clearRect(0,0,cv.width,cv.height);
    parts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.35; p.r+=p.vr; p.life-=0.008;
      if(p.life<=0) return;
      ctx.save(); ctx.globalAlpha=Math.max(p.life,0); ctx.translate(p.x,p.y); ctx.rotate(p.r);
      ctx.fillStyle=p.c; ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.6); ctx.restore();
    });
    if(t<160) requestAnimationFrame(tick); else ctx.clearRect(0,0,cv.width,cv.height);
  })();
}

render();
</script>
